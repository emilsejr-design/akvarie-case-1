<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

<div class="background_move_around">
    <!-- BAGGRUNDEN -->
    <img src="img/game_background.jpg" id="backgroundPic" alt="background">

    <!-- FISK MED ANIMATION-->
    <div class="fish-container">
        <img id="fish_1" src="img/fish_1.png" alt="fish 1">
        <img id="fish-2" src="img/fish-2.png" alt="fish 2">
        <img id="crab" src="img/crab.png" alt="crab">
        <img id="fish-3" src="img/fish-3.png" alt="fish 3">
        <img id="fish-4" src="img/fish-4.png" alt="fish 4">
    </div>
    <!-- FISK + SKRALD MED FUNCTION -->
    <div class="trashFish">
        <img id="fish2" src="img/sigrid-fish.png" alt="fisk">
        <img id="fish1" src="img/emils-fisk.png" alt="fisk">
        <img id="fish3" src="img/katrine-horse.png" alt="hest">
        <img id="fish4" src="img/oliver-fish.png" alt="fisk">
        <img id="skraldepose1" src="img/gennemsigtig-pose.png" alt="skraldepose">
        <img id="skraldepose2" src="img/orange-pose.png" alt="skraldepose">
        <img id="krus" src="img/krus.png" alt="krus">
        <img id="skraldepose3" src="img/lille-pose.png" alt="skrald">
    </div>
    <!-- TANG -->
    <div class="seaweed">
        <img id="seaweed_1" src="gif/seaweed_1.gif" alt="seaweed_1">
        <img id="seaweed_2" src="gif/seaweed_2.gif" alt="seaweed_2">
        <img id="seaweed_3" src="gif/seaweed_3.gif" alt="seaweed_3">
    </div>
</div>

<!-- BOBLER -->
<div id="bubbleContainer"></div>

<div class="viewport_layout">
    <!-- PORGRESSBAR -->
    <div id="progressContainer">
        <div id="progressBar" value="0" max="100"></div> 
    </div>

    <!-- NAVIGATIONSPILE -->
    <nav class="navButtons">
        <button id="leftButton">⬅️</button>
        <button id="rightButton">➡️</button>
     </nav>
</div>


    <script src="js/script.js"></script>
</body>
</html>
