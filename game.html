<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>

<div class="background_move_around">
    <!-- BAGGRUNDEN -->
    <img src="img/game_background.jpg" id="backgroundPic" alt="background">

    <!-- FISK MED ANIMATION-->
    <div class="fish-container">
        <img id="fish_1" src="img/fish_1.png" alt="fish 1">
    </div>
    <!-- FISK + SKRALD MED FUNCTION -->
    <div>
        <img id="fish2" src="img/fish-2.png" alt="fisk">
        <img id="fish1" src="img/fish-1.png" alt="fisk">
        <img id="skraldepose1" src="img/gennemsigtig-pose.png" alt="skraldepose">
        <img id="skraldepose2" src="img/orange-pose.png" alt="skraldepose">
    </div>
    <!-- TANG -->
    <div class="seaweed">
        <img id="seaweed_1" src="gif/seaweed_1.gif" alt="seaweed_1">
        <img id="seaweed_3" src="gif/seaweed_3.gif" alt="seaweed_3">
    </div>
</div>

<!-- BOBLER -->
<div id="bubbleContainer"></div>

<div class="viewport_layout">
    <!-- PORGRESSBAR -->
    <div id="progressContainer">
        <div id="progressBar" value="0" max="100"></div> 
    </div>

    <!-- NAVIGATIONSPILE -->
    <button id="leftButton">⬅️</button>
    <button id="rightButton">➡️</button>
</div>



<!-- Slutside tekst -->
<div id="slutTekst"></div>

    <script src="js/script.js"></script>
